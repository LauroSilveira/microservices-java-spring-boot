apiVersion: apps/v1
kind: Deployment
metadata:
  name: gateway
  labels:
    app: gateway
spec:
  replicas: 2
  selector:
    matchLabels:
      app: gateway
  template:
    metadata:
      labels:
        app: gateway
    spec:
      containers:
        - name: gateway
          image: leonardosartorello/java-gateway-k8s:v1
          ports:
            - containerPort: 80
          env:
            - name: SERVER_HOST
              configMapKeyRef:
                name: dados
                key: SERVER_HOST