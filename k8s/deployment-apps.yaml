metadata:
  name: service-discovery
  labels:
    app: service-discovery
spec:
  replicas: 1
  selector:
    matchLabels:
      app: service-discovery
  template:
    metadata:
      labels:
        app: service-discovery
    spec:
      containers:
        - name: service-discovery
          image: laurocorreia/service-discovery:1.0.1
          ports:
            - containerPort: 80
          env:
            - name: SERVER_HOST
              valueFrom:
                configMapKeyRef:
                  name: data
                  key: SERVER_HOST
